<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Tree Builder</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="hero">
      <p class="eyebrow">Skill Tree Builder</p>
      <h1>Plan your learning with clear skill trees.</h1>
      <p class="hero-copy">
        Build an account, log in, and create a skill tree for goals like frontend
        development or data science.
      </p>
    </header>

    <main class="page">
      <section class="card">
        <h2>Register</h2>
        <form id="register-form" class="form">
          <input id="register-name" type="text" placeholder="Name" required />
          <input id="register-email" type="email" placeholder="Email" required />
          <input id="register-password" type="password" placeholder="Password" required />
          <button type="submit">Create Account</button>
        </form>
      </section>

      <section class="card">
        <h2>Login</h2>
        <form id="login-form" class="form">
          <input id="login-email" type="email" placeholder="Email" required />
          <input id="login-password" type="password" placeholder="Password" required />
          <button type="submit">Log In</button>
        </form>
      </section>

      <section class="card" id="dashboard-section">
        <h2>Dashboard</h2>
        <p id="current-user-message">Log in to see your trees.</p>

        <form id="tree-form" class="form hidden">
          <input id="tree-title" type="text" placeholder="Tree title" required />
          <textarea id="tree-description" placeholder="Tree description"></textarea>
          <label class="checkbox-row">
            <input id="tree-public" type="checkbox" />
            <span>Make this tree public</span>
          </label>
          <button type="submit">Create Tree</button>
        </form>

        <ul id="tree-list" class="tree-list"></ul>
      </section>

      <p id="status-message" class="status-message"></p>
    </main>

    <script src="/script.js"></script>
  </body>
</html>
